<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Send Feedback</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/user/css/feedback.css" rel="stylesheet">
</head>
<body>
    <div class="container-fluid sticky-top" style="background: #1C1F2E;">
        <div class="container">
            <nav class="navbar navbar-expand-lg p-0" style="background: #1C1F2E;">
                <a href="/myapp/userhome_get/" class="navbar-brand">
                    <h1 class="m-0"><i class="fas fa-comment-dots me-2"></i>Feedback</h1>
                </a>
                <div class="ms-auto">
                    <a href="/myapp/userhome_get/" class="btn-back">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                </div>
            </nav>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="complaint-header">
                    <i class="fas fa-envelope"></i>
                    <h1>Send Feedback</h1>
                    <p>We value your feedback</p>
                </div>

                <div class="complaint-form-card">
                    <form method="post" action="/myapp/sentcomplaint_post/">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label for="complaint" class="form-label">
                                <i class="fas fa-pen"></i> Your Feedback
                            </label>
                            <textarea class="form-control" id="complaint" rows="5" placeholder="Write your feedback here..." required name="complaint"></textarea>
                        </div>

                        <button type="submit" class="btn-submit">
                            <i class="fas fa-paper-plane me-2"></i>Send Feedback
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
