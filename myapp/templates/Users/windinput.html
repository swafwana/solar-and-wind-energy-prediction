<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wind Energy Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="/static/user/css/wind_prediction.css" rel="stylesheet">
    <style>
        body {
            background: #FFF7ED;
        }
        .navbar {
            background: #1C1F2E !important;
        }
        .navbar-brand h1 {
            color: #F68A0A !important;
        }
    </style>
</head>
<body>
    <div class="container-fluid sticky-top" style="background: #1C1F2E;">
        <div class="container">
            <nav class="navbar navbar-expand-lg p-0" style="background: #1C1F2E;">
                <a href="/myapp/userhome_get/" class="navbar-brand">
                    <h1 class="m-0" style="color: #F68A0A; font-size: 1.5rem;">
                        <i class="fas fa-wind me-2"></i>Wind Prediction
                    </h1>
                </a>
                <div class="ms-auto">
                    <a href="/myapp/userhome_get/" class="btn btn-primary rounded-pill py-2 px-4">
                        <i class="fas fa-arrow-left me-2"></i>Back
                    </a>
                </div>
            </nav>
        </div>
    </div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="wind-header">
                    <i class="fas fa-wind"></i>
                    <h1>Wind Energy Prediction</h1>
                    <p>Predict wind power generation based on weather conditions</p>
                </div>

                <div class="prediction-form-card">
                    <form id="windForm">
                        {% csrf_token %}

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-calendar"></i> Date
                                </label>
                                <input type="date" class="form-control" id="date" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-clock"></i> Time
                                </label>
                                <input type="time" class="form-control" id="timestamp" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-thermometer-half"></i> Temperature 2m (°C)
                                </label>
                                <input type="number" step="any" class="form-control" id="temperature_2m" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-tint"></i> Humidity 2m (%)
                                </label>
                                <input type="number" step="any" class="form-control" id="relativehumidity_2m" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-water"></i> Dew Point 2m (°C)
                                </label>
                                <input type="number" step="any" class="form-control" id="dewpoint_2m" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-wind"></i> Wind Speed 10m (m/s)
                                </label>
                                <input type="number" step="any" class="form-control" id="windspeed_10m" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-wind"></i> Wind Speed 100m (m/s)
                                </label>
                                <input type="number" step="any" class="form-control" id="windspeed_100m" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-compass"></i> Wind Direction 10m (°)
                                </label>
                                <input type="number" step="any" class="form-control" id="winddirection_10m" required>
                            </div>
                        </div>

                        <div class="row g-3 mt-2">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-compass"></i> Wind Direction 100m (°)
                                </label>
                                <input type="number" step="any" class="form-control" id="winddirection_100m" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="fas fa-wind"></i> Wind Gusts 10m (m/s)
                                </label>
                                <input type="number" step="any" class="form-control" id="windgusts_10m" required>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button type="button" onclick="generateWind()" class="btn-predict-wind">
                                <i class="fas fa-chart-line me-2"></i>Generate Prediction
                            </button>
                        </div>
                    </form>

                    <div id="resultCard" class="result-card-wind">
                        <i class="fas fa-wind"></i>
                        <h3 id="result"></h3>
                        <p>Predicted Wind Power</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    function generateWind() {
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const date = document.getElementById("date").value;
        const time = document.getElementById("timestamp").value;

        if (!date || !time) {
            alert("Please fill date and time");
            return;
        }

        const data = {
            timestamp: date + " " + time,
            temperature_2m: document.getElementById("temperature_2m").value,
            relativehumidity_2m: document.getElementById("relativehumidity_2m").value,
            dewpoint_2m: document.getElementById("dewpoint_2m").value,
            windspeed_10m: document.getElementById("windspeed_10m").value,
            windspeed_100m: document.getElementById("windspeed_100m").value,
            winddirection_10m: document.getElementById("winddirection_10m").value,
            winddirection_100m: document.getElementById("winddirection_100m").value,
            windgusts_10m: document.getElementById("windgusts_10m").value
        };

        const resultCard = document.getElementById("resultCard");
        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Calculating...';
        resultCard.classList.add("show");

        fetch("/myapp/windinput_post/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "X-CSRFToken": csrfToken
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            if(result.error){
                resultDiv.innerHTML = '<i class="fas fa-exclamation-triangle me-2"></i>' + result.error;
                setTimeout(() => resultCard.classList.remove("show"), 3000);
            } else {
                resultDiv.innerHTML = result.predicted_power.toFixed(2) + " kW";
            }
        })
        .catch(error => {
            resultDiv.innerHTML = '<i class="fas fa-exclamation-circle me-2"></i>Server Error';
            setTimeout(() => resultCard.classList.remove("show"), 3000);
        });
    }
    </script>
</body>
</html>
