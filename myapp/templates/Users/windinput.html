
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solar Energy Prediction</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container mt-4">
    <h2 class="mb-4">Wind Energy Prediction</h2>

    <form id="solarForm">
      {% csrf_token %}

      <div class="row mb-3">
        <label class="col-sm-4">Date</label>
        <div class="col-sm-8">
          <input type="date" class="form-control" id="date" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">Time</label>
        <div class="col-sm-8">
          <input type="time" class="form-control" id="timestamp" required>
        </div>
      </div>

        <div class="row mb-3">
        <label class="col-sm-4">temperature_2m</label>
        <div class="col-sm-8">
          <input type="text" class="form-control" id="temperature_2m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">relativehumidity_2m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="relativehumidity_2m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">dewpoint_2m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="dewpoint_2m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">windspeed_10m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="windspeed_10m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">windspeed_100m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="windspeed_100m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">winddirection_10m</label>
        <div class="col-sm-8">
          <input type="number" step="any" class="form-control" id="winddirection_10m" required>
        </div>
      </div>

      <div class="row mb-3">
        <label class="col-sm-4">winddirection_100m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="winddirection_100m" required>
        </div>
      </div>

        <div class="row mb-3">
        <label class="col-sm-4">windgusts_10m</label>
        <div class="col-sm-8">
          <input type="text" step="any" class="form-control" id="windgusts_10m" required>
        </div>
      </div>




      <div class="row mb-3">
        <div class="offset-sm-4 col-sm-8">
          <button type="button" onclick="generateWind()" class="btn btn-primary">
            Generate Wind Energy
          </button>
        </div>
      </div>

      <h4 id="result" class="text-success mt-3"></h4>

    </form>
  </div>

<script>

    function generateWind() {

    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    const date = document.getElementById("date").value;
    const time = document.getElementById("timestamp").value;

    const data = {
        timestamp: date + " " + time,
        temperature_2m: document.getElementById("temperature_2m").value,
        relativehumidity_2m: document.getElementById("relativehumidity_2m").value,
        dewpoint_2m: document.getElementById("dewpoint_2m").value,
        windspeed_10m: document.getElementById("windspeed_10m").value,
        windspeed_100m: document.getElementById("windspeed_100m").value,
        winddirection_10m: document.getElementById("winddirection_10m").value,
        winddirection_100m: document.getElementById("winddirection_100m").value,
        windgusts_10m: document.getElementById("windgusts_10m").value
    };

    fetch("/myapp/windinput_post/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": csrfToken
        },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {

        if(result.error){
            alert("Error: " + result.error);
        } else {

            let message = "Expected Wind Power: " + result.predicted_power + " kW";

            document.getElementById("result").innerHTML = message;

            alert(message);   // dialog box
        }

    })
    .catch(error => {
        alert("Server Error");
        console.error(error);
    });
}
</script>

</body>
</html>
